# Palisade CI/CD — build, test, and deploy all services to AWS ECS.
#
# Shares the AWS account (600743178530), ECS cluster (`vera`), VPC, and
# ALBs with the Vera repo — see scripts/aws-setup.sh header.  All Palisade
# resources are prefixed `palisade-*`.  Secrets live in a separate
# `palisade/*` namespace in Secrets Manager.
#
# AWS auth: GitHub OIDC → assume IAM role gha-oidc-deploy.  No
# long-lived access keys in repo secrets (Stage H.4 / PCI DSS 8.3).
# The role's trust policy restricts assumption to:
#   repo:andtechxyz/karta.cards.palisade:*
#   repo:andtechxyz/karta.cards.vera:*
# Both repos share the same role + policy; rotation = update one IAM
# resource instead of two repo secrets.
#
# Cost-optimisations applied:
#   - `paths-ignore` skips the workflow for docs / config / applet-only
#     commits (saves ~30 min / push when true)
#   - `concurrency` cancels queued runs on rapid-fire pushes to main
#   - `actions/setup-node@v4` with `cache: 'npm'` reuses the npm cache
#     (~40s saved per test job)
#   - `docker/build-push-action@v6` with `type=gha` layer cache reuses the
#     Dockerfile's builder stage across runs (~2 min saved per matrix job)

name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'applets/**'            # Java applet source is built off-pipeline
      - '.vscode/**'
      - '.gitignore'
      - '.gitattributes'
      - '**/CODEOWNERS'
      - 'test-fixtures/**'
  # Manual-trigger path for prototype branches (e.g. chip-computed-DGI
  # rollout).  Lets operators deploy a named ref without merging to main.
  # The `services` input narrows the matrix to just the services that need
  # rebuilding — omit or set to '*' to deploy all services.
  workflow_dispatch:
    inputs:
      services:
        description: 'Comma-separated services to deploy (or "*" for all).  E.g. "rca,data-prep"'
        required: false
        default: '*'
        type: string

concurrency:
  # One deploy at a time per branch — rapid-fire pushes cancel the
  # earlier queued run so we don't build+deploy the same code twice.
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ap-southeast-2
  ECR_REGISTRY: 600743178530.dkr.ecr.ap-southeast-2.amazonaws.com
  ECS_CLUSTER: vera

permissions:
  contents: read
  # CPL LSR 9 — cosign keyless signing via Sigstore needs a GitHub
  # OIDC token to exchange for a short-lived Fulcio cert.
  id-token: write

jobs:
  # ---------------------------------------------------------------------------
  # Test — install, type-check, run tests
  # ---------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          # setup-node's built-in npm cache.  Keyed on package-lock.json
          # hash; invalidated automatically when deps change.
          cache: 'npm'

      - run: npm ci
      # PCI DSS 4.0.1 §6.3.3 / CPL LSR 3: high-severity vulnerabilities in
      # dependencies must block CI.  This step previously ran with
      # `continue-on-error: true` which silently admitted CRITICAL+ vulns
      # — removed 2026-04-21 per the PCI audit (see
      # docs/compliance/PCI_DSS_4_0_1_AUDIT_2026-04-21.md §Req 5).
      # Override for a specific CVE requires a documented exception in
      # this workflow + a tracking issue.
      - run: npm audit --audit-level=high
      - run: npx prisma generate --schema packages/db/prisma/schema.prisma
      - run: npx tsc -b
      - run: npx vitest run

      # CPL LSR 9 — SBOM (Software Bill of Materials).  Attached as a
      # workflow artifact on every successful test run so operators can
      # diff the dependency set between releases.  Uses the OWASP
      # CycloneDX format which is widely tool-supported (GitHub's
      # dependency graph, Snyk, Trivy, sigstore/rekor).
      - name: Generate CycloneDX SBOM
        run: npx --yes @cyclonedx/cyclonedx-npm --output-format json --output-file sbom.cdx.json
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ github.sha }}
          path: sbom.cdx.json
          retention-days: 90

  # ---------------------------------------------------------------------------
  # Build & Deploy — one job per service via matrix
  # ---------------------------------------------------------------------------
  build-and-deploy:
    name: Deploy ${{ matrix.service }}
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Single-cluster AWS reality: we share Vera's AWS account + ECS
        # cluster + RDS.  As of 2026-04-20 the ECR repos + ECS services
        # were renamed from `vera-*` → `palisade-*` (blue/green swap;
        # see ops_ecs_rename_tonight.md for the runbook).  Old vera-*
        # services are kept at desired-count=0 for 24h rollback.
        #
        # admin is palisade-admin.  card-ops joined the matrix
        # 2026-04-22 now that remote-ops perso requires a dedicated
        # service (LSR 6 closure).  The card-ops service + ALB target
        # group + listener rule on card-ops.karta.cards were created
        # out-of-band; CI just maintains the image + task-def going
        # forward.  Deploy step tolerates "service not yet created"
        # during bootstrap so the first push doesn't fail.
        include:
          - service: tap
            port: 3001
          - service: activation
            port: 3002
          - service: admin
            port: 3003
          - service: data-prep
            port: 3006
          - service: rca
            port: 3007
          - service: batch-processor
            port: 3008
          - service: card-ops
            port: 3010
          - service: sftp
            port: 22
            dockerfile: services/sftp/Dockerfile

    env:
      IMAGE_TAG: ${{ github.sha }}
      # Post-rename: push to palisade-* ECR repos + update palisade-* ECS.
      ECR_REPO: palisade-${{ matrix.service }}

    steps:
      # Early-skip for workflow_dispatch: if the operator narrowed the
      # deploy with `inputs.services`, any matrix entry not in that list
      # exits here.  `steps.filter.outputs.run` gates every subsequent
      # step so we don't waste CI time checking out / building images
      # for services that weren't asked for.  Push builds always run
      # (the `if:` short-circuits on github.event_name != 'workflow_dispatch').
      - name: Filter matrix by inputs.services
        id: filter
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" != "workflow_dispatch" || "${{ inputs.services }}" == "*" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ ",${{ inputs.services }}," == *",${{ matrix.service }},"* ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping ${{ matrix.service }} — not in inputs.services=${{ inputs.services }}"
          fi

      - uses: actions/checkout@v4
        if: steps.filter.outputs.run == 'true'

      - name: Configure AWS credentials (OIDC)
        if: steps.filter.outputs.run == 'true'
        # Stage H.4 — short-lived creds via GitHub OIDC.  No long-lived
        # access key in repo secrets.  PCI DSS 8.3/8.5: privileged
        # access uses ephemeral, role-bound credentials per CI run.
        # Trust policy on gha-oidc-deploy restricts assumption to
        # repo:andtechxyz/karta.cards.{palisade,vera}:* — see
        # docs/runbooks/gha-oidc.md (or scripts/aws-setup.sh's H.4 block).
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::600743178530:role/gha-oidc-deploy
          role-session-name: gha-palisade-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        if: steps.filter.outputs.run == 'true'
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        if: steps.filter.outputs.run == 'true'
        # Required for build-push-action's cache backend (type=gha
        # isn't available on the default docker driver).
        uses: docker/setup-buildx-action@v3

      # Stage H.1 follow-up — verify cosign signatures on any CAP file
      # that has a sibling .bundle.  This runs only for the card-ops
      # service (the only one that actually ships cap-files/) so other
      # service builds don't pay the install-cosign cost for nothing.
      #
      # Bundles are produced off-pipeline by an operator running:
      #   cosign sign-blob --bundle cap-files/<name>.cap.bundle \
      #                    --yes cap-files/<name>.cap
      # (uses the operator's own GitHub OIDC keyless identity; signed
      # bundle commits alongside the CAP).  See
      # docs/runbooks/cap-signing.md for the full playbook.
      #
      # Missing bundle = warning (transitional; bundles roll out per
      # CAP).  Present bundle that fails verification = CI failure
      # (a tampered CAP must not land in the runtime image).
      - name: Verify CAP cosign signatures (card-ops only)
        if: steps.filter.outputs.run == 'true' && matrix.service == 'card-ops'
        uses: sigstore/cosign-installer@v3
      - name: cosign verify-blob over cap-files/*.cap
        if: steps.filter.outputs.run == 'true' && matrix.service == 'card-ops'
        env:
          # Allowlist regex for accepted signing identities.  Default:
          # any commit/PR member of the two repos that share the
          # gha-oidc-deploy IAM role.  Tighten in prod to a specific
          # operator-account list once the human signers are picked.
          COSIGN_ID_REGEX: 'https://github\.com/(andtechxyz|.+@.+)'
          COSIGN_OIDC_ISSUER: 'https://token.actions.githubusercontent.com'
        run: |
          shopt -s nullglob
          fail=0
          for cap in services/card-ops/cap-files/*.cap; do
            bundle="${cap}.bundle"
            if [[ -f "$bundle" ]]; then
              echo "::group::cosign verify-blob $cap"
              if cosign verify-blob \
                  --bundle "$bundle" \
                  --certificate-identity-regexp "$COSIGN_ID_REGEX" \
                  --certificate-oidc-issuer "$COSIGN_OIDC_ISSUER" \
                  "$cap"; then
                echo "::endgroup::"
              else
                echo "::endgroup::"
                echo "::error file=$cap::cosign verify-blob FAILED for $cap"
                fail=1
              fi
            else
              echo "::warning file=$cap::no .bundle next to $cap (transitional; sign with docs/runbooks/cap-signing.md)"
            fi
          done
          if [[ "$fail" != "0" ]]; then exit 1; fi

      - name: Compute short SHA
        if: steps.filter.outputs.run == 'true'
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        if: steps.filter.outputs.run == 'true'
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile || 'Dockerfile' }}
          build-args: |
            SERVICE=${{ matrix.service }}
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ steps.sha.outputs.short }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:latest
          # GHA layer cache scoped per-service so the tap service's
          # builder stage doesn't thrash with rca's, and mode=max caches
          # all intermediate layers (bigger cache, much faster rebuilds).
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      # CPL LSR 9 / PCI DSS 6.3 — cosign image signing.  Keyless mode
      # via GitHub's OIDC identity + Sigstore's Fulcio CA → signature +
      # transparency-log entry in rekor, verifiable against the repo +
      # workflow identity.  Zero long-lived signing keys to rotate; the
      # attestation is tied to the CI run that produced the image.
      #
      # Verify downstream with:
      #   cosign verify <image> \
      #     --certificate-identity-regexp 'https://github.com/andtechxyz/karta\\.cards\\.palisade' \
      #     --certificate-oidc-issuer 'https://token.actions.githubusercontent.com'
      - name: Install cosign
        if: steps.filter.outputs.run == 'true'
        uses: sigstore/cosign-installer@v3
      - name: Sign image with cosign (keyless OIDC)
        if: steps.filter.outputs.run == 'true'
        env:
          COSIGN_EXPERIMENTAL: 'true'
          IMAGE_REF: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}@${{ steps.build.outputs.digest }}
        run: |
          # Sign by digest — tag-based signing is ambiguous (tags can
          # move) and rekor-verified provenance needs a pinned digest
          # to be meaningful.
          cosign sign --yes "$IMAGE_REF"

      - name: Update ECS task definition and deploy
        if: steps.filter.outputs.run == 'true'
        run: |
          # Post-rename: services are palisade-* in the shared vera cluster.
          SERVICE_NAME=palisade-${{ matrix.service }}
          FULL_IMAGE=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ steps.sha.outputs.short }}

          # Bootstrap tolerance: on the very first push of a new
          # service (added to the matrix but not yet created in ECS),
          # describe-services returns `MISSING`.  Image is already
          # pushed to ECR at this point — operator can run
          # `aws ecs create-service` referencing the built tag when
          # ready.  Don't fail the whole deploy matrix on a
          # missing-service entry.
          EXISTING_TASK_DEF_ARN=$(aws ecs describe-services \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${SERVICE_NAME} \
            --query 'services[?status==`ACTIVE`].taskDefinition | [0]' \
            --output text 2>/dev/null || echo "None")
          if [ "${EXISTING_TASK_DEF_ARN}" = "None" ] || [ -z "${EXISTING_TASK_DEF_ARN}" ]; then
            echo "::notice::Service ${SERVICE_NAME} not yet created; skipping task-def update after image push to ${FULL_IMAGE}.  Run aws ecs create-service manually to bootstrap."
            exit 0
          fi

          # Fetch the current task definition
          TASK_DEF_ARN=$EXISTING_TASK_DEF_ARN

          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition "${TASK_DEF_ARN}" \
            --query 'taskDefinition')

          # Update the container image in the task definition and register a new revision
          NEW_TASK_DEF=$(echo "${TASK_DEF}" | \
            jq --arg IMAGE "${FULL_IMAGE}" \
              '.containerDefinitions[0].image = $IMAGE' | \
            jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)')

          NEW_TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json "${NEW_TASK_DEF}" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          # Update the ECS service to use the new task definition
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${SERVICE_NAME} \
            --task-definition "${NEW_TASK_DEF_ARN}" \
            --force-new-deployment \
            --query 'service.serviceName' \
            --output text

          echo "Deployed ${FULL_IMAGE} to ${SERVICE_NAME} (task def: ${NEW_TASK_DEF_ARN})"
