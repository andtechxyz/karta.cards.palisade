# Palisade CI/CD — build, test, and deploy all services to AWS ECS.
#
# Shares the AWS account (600743178530), ECS cluster (`vera`), VPC, and
# ALBs with the Vera repo — see scripts/aws-setup.sh header.  All Palisade
# resources are prefixed `palisade-*`.  Secrets live in a separate
# `palisade/*` namespace in Secrets Manager.
#
# Required GitHub Secrets (same IAM user as Vera is fine):
#   AWS_ACCESS_KEY_ID      — IAM access key with permissions for ECR push and ECS deploy
#   AWS_SECRET_ACCESS_KEY  — Corresponding IAM secret key
#
# Cost-optimisations applied:
#   - `paths-ignore` skips the workflow for docs / config / applet-only
#     commits (saves ~30 min / push when true)
#   - `concurrency` cancels queued runs on rapid-fire pushes to main
#   - `actions/setup-node@v4` with `cache: 'npm'` reuses the npm cache
#     (~40s saved per test job)
#   - `docker/build-push-action@v6` with `type=gha` layer cache reuses the
#     Dockerfile's builder stage across runs (~2 min saved per matrix job)

name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'applets/**'            # Java applet source is built off-pipeline
      - '.vscode/**'
      - '.gitignore'
      - '.gitattributes'
      - '**/CODEOWNERS'
      - 'test-fixtures/**'
  # Manual-trigger path for prototype branches (e.g. chip-computed-DGI
  # rollout).  Lets operators deploy a named ref without merging to main.
  # The `services` input narrows the matrix to just the services that need
  # rebuilding — omit or set to '*' to deploy all services.
  workflow_dispatch:
    inputs:
      services:
        description: 'Comma-separated services to deploy (or "*" for all).  E.g. "rca,data-prep"'
        required: false
        default: '*'
        type: string

concurrency:
  # One deploy at a time per branch — rapid-fire pushes cancel the
  # earlier queued run so we don't build+deploy the same code twice.
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ap-southeast-2
  ECR_REGISTRY: 600743178530.dkr.ecr.ap-southeast-2.amazonaws.com
  ECS_CLUSTER: vera

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Test — install, type-check, run tests
  # ---------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          # setup-node's built-in npm cache.  Keyed on package-lock.json
          # hash; invalidated automatically when deps change.
          cache: 'npm'

      - run: npm ci
      - run: npm audit --audit-level=high
        continue-on-error: true
      - run: npx prisma generate --schema packages/db/prisma/schema.prisma
      - run: npx tsc -b
      - run: npx vitest run

  # ---------------------------------------------------------------------------
  # Build & Deploy — one job per service via matrix
  # ---------------------------------------------------------------------------
  build-and-deploy:
    name: Deploy ${{ matrix.service }}
    needs: test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Single-cluster AWS reality: we share Vera's AWS account + ECS
        # cluster + RDS + ECR registry.  For fastest tap-test deploy
        # Palisade pushes to the EXISTING vera-* ECR repos + updates
        # the EXISTING vera-* ECS services.  Renaming to palisade-*
        # is a later cleanup (creates new service copies + DNS move).
        #
        # card-ops + admin deliberately NOT in this matrix for the
        # first-tap-after-split deploy:
        #   - card-ops has no vera-card-ops ECS service yet; needs
        #     explicit provisioning
        #   - admin lives on Vera and backends via dual-backend SPA;
        #     Palisade-admin deploys separately post-tap-test
        include:
          - service: tap
            port: 3001
          - service: activation
            port: 3002
          - service: data-prep
            port: 3006
          - service: rca
            port: 3007
          - service: batch-processor
            port: 3008
          - service: sftp
            port: 22
            dockerfile: services/sftp/Dockerfile

    env:
      IMAGE_TAG: ${{ github.sha }}
      # Reuse existing vera-* ECR repos (see header comment).
      ECR_REPO: vera-${{ matrix.service }}

    steps:
      # Early-skip for workflow_dispatch: if the operator narrowed the
      # deploy with `inputs.services`, any matrix entry not in that list
      # exits here.  `steps.filter.outputs.run` gates every subsequent
      # step so we don't waste CI time checking out / building images
      # for services that weren't asked for.  Push builds always run
      # (the `if:` short-circuits on github.event_name != 'workflow_dispatch').
      - name: Filter matrix by inputs.services
        id: filter
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" != "workflow_dispatch" || "${{ inputs.services }}" == "*" ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ ",${{ inputs.services }}," == *",${{ matrix.service }},"* ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping ${{ matrix.service }} — not in inputs.services=${{ inputs.services }}"
          fi

      - uses: actions/checkout@v4
        if: steps.filter.outputs.run == 'true'

      - name: Configure AWS credentials
        if: steps.filter.outputs.run == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        if: steps.filter.outputs.run == 'true'
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        if: steps.filter.outputs.run == 'true'
        # Required for build-push-action's cache backend (type=gha
        # isn't available on the default docker driver).
        uses: docker/setup-buildx-action@v3

      - name: Compute short SHA
        if: steps.filter.outputs.run == 'true'
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        if: steps.filter.outputs.run == 'true'
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile || 'Dockerfile' }}
          build-args: |
            SERVICE=${{ matrix.service }}
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ steps.sha.outputs.short }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:latest
          # GHA layer cache scoped per-service so the tap service's
          # builder stage doesn't thrash with rca's, and mode=max caches
          # all intermediate layers (bigger cache, much faster rebuilds).
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Update ECS task definition and deploy
        if: steps.filter.outputs.run == 'true'
        run: |
          # Reuse existing vera-* ECS services (single-cluster).
          SERVICE_NAME=vera-${{ matrix.service }}
          FULL_IMAGE=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPO }}:${{ steps.sha.outputs.short }}

          # Fetch the current task definition
          TASK_DEF_ARN=$(aws ecs describe-services \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${SERVICE_NAME} \
            --query 'services[0].taskDefinition' \
            --output text)

          TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition "${TASK_DEF_ARN}" \
            --query 'taskDefinition')

          # Update the container image in the task definition and register a new revision
          NEW_TASK_DEF=$(echo "${TASK_DEF}" | \
            jq --arg IMAGE "${FULL_IMAGE}" \
              '.containerDefinitions[0].image = $IMAGE' | \
            jq 'del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)')

          NEW_TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json "${NEW_TASK_DEF}" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          # Update the ECS service to use the new task definition
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${SERVICE_NAME} \
            --task-definition "${NEW_TASK_DEF_ARN}" \
            --force-new-deployment \
            --query 'service.serviceName' \
            --output text

          echo "Deployed ${FULL_IMAGE} to ${SERVICE_NAME} (task def: ${NEW_TASK_DEF_ARN})"
